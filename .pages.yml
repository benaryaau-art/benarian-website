media:
  input: assets/images
  output: /assets/images
  categories:
    - image
  rename: safe

content:
  - name: homepage
    label: Homepage
    type: file
    path: index.html
    format: code
    operations:
      delete: false

  - name: styles
    label: Website Style & Fonts
    type: file
    path: assets/styles.css
    format: code
    operations:
      delete: false

  - name: logo
    label: Logo
    type: file
    path: assets/logo.svg
    format: code
    operations:
      delete: false

  - name: partner
    label: Affiliate Settings
    type: file
    path: assets/partner-config.js
    format: code
    operations:
      delete: false

  - name: pages
    label: Website Pages
    type: collection
    path: .
    filename: "{primary}.html"
    view:
      fields:
        - primary
    fields:
      - name: body
        label: HTML
        type: code